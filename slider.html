<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Showcase - Final</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        .client-section {
            padding: 100px 40px;
            max-width: 1400px;
            margin: auto;
        }

        .client-container {
            border-top: 0.3px solid #dddee097;
            border-bottom: 0.3px solid #dddee097;
            display: grid;
            padding: 20px 0;
            grid-template-columns: 0.5fr 1.5fr;
            gap: 80px;
        }

        .client-text h3 {
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .client-text p {
            font-size: 16px;
            color: #777;
            max-width: 400px;
        }

        .client-images {
            display: flex;
            flex-direction: row;
            height: 420px;
            gap: 1px;
            overflow: hidden;
        }

        .client-item {
            flex: 1;
            overflow: hidden;
            cursor: pointer;
            transition: flex 1.5s cubic-bezier(.77, 0, .18, 1);
        }

        .client-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 2s ease;
        }

        .client-images:hover .client-item {
            flex: 0.7;
        }

        .client-images .client-item:hover {
            flex: 5;
        }

        .client-item:hover img {
            transform: scale(1.01);
        }

        @media (max-width: 992px) {

            .client-container {
                grid-template-columns: 1fr;
                gap: 50px;
            }

            .client-images {
                height: 300px;
            }
        }

    </style>
</head>

<body>

    <section class="client-section">

        <div class="client-container">

            <!-- LEFT TEXT -->
            <div class="client-text">
                <h3>Client Name</h3>
                <p>"Case as a story"</p>
            </div>

            <!-- RIGHT IMAGES -->
            <div class="client-images">

                <div class="client-item">
                    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
                </div>

                <div class="client-item">
                    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
                </div>

                <div class="client-item">
                    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
                </div>

                <div class="client-item">
                    <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
                </div>

            </div>

        </div>

    </section>

</body>

</html>
